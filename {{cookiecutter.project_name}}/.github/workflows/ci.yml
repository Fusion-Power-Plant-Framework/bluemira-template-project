name: bluemira_{{cookiecutter.project_name}}

on:
  schedule:
    # Runs twice a day at 7.05 and 12.05 Monday to Friday
    - cron: "{{cookiecutter.ci_schedule}}"
  pull_request:
  push:
    branches:
      - develop
      - main

env:
  python-version: "3.11"

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup python and hatch
        uses: Fusion-Power-Plant-Framework/fppf-actions/setup-hatch@deddef408d0061e542692a7bf97368449c5ee5b3
{%- raw %}
          python-version: ${{ env.python-version }}
{%- endraw %}

      - name: Run Hatch linting tasks
        uses: Fusion-Power-Plant-Framework/fppf-actions/hatch-lint@deddef408d0061e542692a7bf97368449c5ee5b3

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build bluemira
        uses: Fusion-Power-Plant-Framework/fppf-actions/build-action@deddef408d0061e542692a7bf97368449c5ee5b3
        with:
{%- raw %}
          python-version: ${{ env.python-version }}
{%- endraw %}
          clone-bluemira: "true"

      - name: Run pytest
        shell: bash -l {0}
        env:
          PACKAGE: {{ cookiecutter.project_name }}
        run: |
          pytest --cov=${PACKAGE} \
                 --cov-report html:htmlcov \
                 --cov-report xml \
                 --json-report \
                 --json-report-indent=3 \
                 tests
